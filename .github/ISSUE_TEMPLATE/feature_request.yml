name: Feature request
description: Suggest a new feature or improvement to the SDK
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make the SDK better? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? What use case does it support?
      placeholder: "e.g. There's no way to attach a file when sending a message..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see added or changed.
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API (optional)
      description: If applicable, sketch out what the new API might look like.
      render: php

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches or workarounds you've considered?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to Max Bot API docs, related issues, or anything else relevant.
