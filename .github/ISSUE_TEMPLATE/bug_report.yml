name: Bug report
description: Report a bug or unexpected behaviour in the SDK
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: "e.g. 8.1.32"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code snippet or sequence of steps to reproduce the issue.
      render: php
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include the full exception message and stack trace if applicable.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant — OS, Guzzle version, special config, etc.
